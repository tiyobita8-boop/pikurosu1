<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノビピクロス</title>

<style>
body{font-family:sans-serif;text-align:center;}

#topMessage{font-size:20px;margin:10px;font-weight:bold;}

.container{
  display:inline-block;
}

.topHints{
  display:grid;
  grid-template-columns:60px repeat(25,18px);
}

.leftHints{
  display:grid;
  grid-template-rows:repeat(25,18px);
}

.gridArea{
  display:flex;
}

.grid{
  display:grid;
  grid-template-columns:repeat(25,18px);
  gap:1px;
}

.cell{
  width:18px;height:18px;
  background:#eee;border:1px solid #bbb;
}

.filled{background:#000;}
.wrong{background:#ff4444 !important;}
.diff{outline:2px solid yellow;}

.hintCell{
  font-size:10px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.leftHint{
  width:60px;
  text-align:right;
  font-size:10px;
  padding-right:5px;
  line-height:18px;
}

button{margin:10px;padding:8px 12px;}
</style>
</head>

<body>

<h2>🧩 ノビピクロス</h2>

<div id="topMessage">🙂 がんばってね</div>
<div>ミス回数：<span id="missCount">0</span></div>

<button onclick="judge()">判定する</button>

<div class="container">

<!-- 上ヒント -->
<div id="topHints" class="topHints"></div>

<div class="gridArea">
  <!-- 左ヒント -->
  <div id="leftHints" class="leftHints"></div>

  <!-- グリッド -->
  <div id="grid" class="grid"></div>
</div>

</div>

<script>
const SIZE=25;
let miss=0;

const solution=[
"0000000000001000000000000",
"0000011111111111111100000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000010000000000000",
"0000000001100000000000000",
"0000000000000000000000000",
"0000000000000000010000000",
"0000000000000000100000000",
"0000000000000001000000000",
"0000000011111110000000000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000000000000000000",
"0000000011111111100000000",
"0000000000000001000000000",
"0000000000000010000000000",
"0000000000000110000000000",
"0000000000001001000000000",
"0000000000010000100000000",
"0000000000000100000000000",
"0000000000111111100000000",
"0000000000100000100000000",
"0000000000000011100000000"
].map(r=>r.split("").map(Number));

// ヒント生成
function getHints(line){
  let res=[],count=0;
  for(let v of line){
    if(v===1) count++;
    else if(count){res.push(count);count=0;}
  }
  if(count) res.push(count);
  return res.length?res:["0"];
}

// 上ヒント
const topHints=document.getElementById("topHints");
topHints.appendChild(document.createElement("div")); // 左上空白

for(let c=0;c<SIZE;c++){
  let col=solution.map(r=>r[c]);
  let hints=getHints(col);

  let div=document.createElement("div");
  div.className="hintCell";
  div.innerHTML=hints.join("<br>");
  topHints.appendChild(div);
}

// 左ヒント
const leftHints=document.getElementById("leftHints");
for(let r=0;r<SIZE;r++){
  let div=document.createElement("div");
  div.className="leftHint";
  div.innerText=getHints(solution[r]).join(" ");
  leftHints.appendChild(div);
}

// グリッド
const grid=document.getElementById("grid");
let cells=[];
let isDragging=false;

for(let r=0;r<SIZE;r++){
  cells[r]=[];
  for(let c=0;c<SIZE;c++){
    const cell=document.createElement("div");
    cell.className="cell";

    const apply=()=>{
      cell.classList.add("filled");

      if(solution[r][c]===0){
        miss++;
        document.getElementById("missCount").innerText=miss;

        cell.classList.add("wrong");

        setTimeout(()=>{
          cell.classList.remove("filled","wrong");
        },500);

        document.getElementById("topMessage").innerText="⚠️ 間違っているよ";
        document.getElementById("topMessage").style.color="red";
      }
    };

    cell.onmousedown=()=>{isDragging=true;apply();}
    cell.onmouseover=()=>{if(isDragging)apply();}
    cell.ontouchstart=()=>apply();

    grid.appendChild(cell);
    cells[r][c]=cell;
  }
}

document.body.onmouseup=()=>isDragging=false;

// 判定
function judge(){
  let correct=true;
  let msg=document.getElementById("topMessage");

  cells.flat().forEach(c=>c.classList.remove("diff"));

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      let filled=cells[r][c].classList.contains("filled");

      if(filled !== (solution[r][c]===1)){
        correct=false;
        cells[r][c].classList.add("diff");
      }
    }
  }

  if(correct){
    msg.innerText="🎉 がんばったね。ookuraさんならナイスゥですよね";
    msg.style.color="green";
  }else{
    msg.innerText="❌ まだ違うところあるよ（黄色がヒント）";
    msg.style.color="orange";
  }
}
</script>

</body>
</html>
