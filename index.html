<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノビピクロス</title>

<style>
body{font-family:sans-serif;text-align:center;}

#topMessage{font-size:20px;margin:10px;font-weight:bold;}

.grid{
  display:grid;
  grid-template-columns:repeat(25, 18px);
  gap:1px;
  justify-content:center;
}

.cell{
  width:18px;height:18px;
  background:#eee;border:1px solid #bbb;
}

.filled{background:#000;}
.mark{background:#fbb;}
.wrong{background:#ff4444 !important;}
.diff{outline:2px solid yellow;}

button{margin:10px;padding:8px 12px;}
</style>
</head>

<body>

<h2>🧩 ノビピクロス</h2>

<div id="topMessage">🙂 がんばってね</div>
<div>ミス回数：<span id="missCount">0</span></div>

<button onclick="judge()">判定する</button>

<div id="grid" class="grid"></div>

<script>
const SIZE=25;
let miss=0;

const solution=[
"0000000000001000000000000",
"0000011111111111111100000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000010000000000000",
"0000000001100000000000000",
"0000000000000000000000000",
"0000000000000000010000000",
"0000000000000000100000000",
"0000000000000001000000000",
"0000000011111110000000000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000001000000000000",
"0000000000000000000000000",
"0000000011111111100000000",
"0000000000000001000000000",
"0000000000000010000000000",
"0000000000000110000000000",
"0000000000001001000000000",
"0000000000010000100000000",
"0000000000000100000000000",
"0000000000111111100000000",
"0000000000100000100000000",
"0000000000000011100000000"
].map(r=>r.split("").map(Number));

const grid=document.getElementById("grid");
let cells=[];
let isDragging=false;

// グリッド生成
for(let r=0;r<SIZE;r++){
  cells[r]=[];
  for(let c=0;c<SIZE;c++){
    const cell=document.createElement("div");
    cell.className="cell";

    const apply=()=>{
      cell.classList.add("filled");

      // ❌ミスなら0.5秒で戻す
      if(solution[r][c]===0){
        miss++;
        document.getElementById("missCount").innerText=miss;

        cell.classList.add("wrong");

        setTimeout(()=>{
          cell.classList.remove("filled","wrong");
        },500);

        document.getElementById("topMessage").innerText="⚠️ 間違っているよ";
        document.getElementById("topMessage").style.color="red";
      }
    };

    cell.onmousedown=()=>{isDragging=true;apply();}
    cell.onmouseover=()=>{if(isDragging)apply();}
    cell.ontouchstart=()=>apply();

    grid.appendChild(cell);
    cells[r][c]=cell;
  }
}

document.body.onmouseup=()=>isDragging=false;

// 🎯 判定ボタン
function judge(){
  let correct=true;
  let msg=document.getElementById("topMessage");

  // まず全diff消す
  cells.flat().forEach(c=>c.classList.remove("diff"));

  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      let filled=cells[r][c].classList.contains("filled");

      // 🔍 違い検出
      if(filled !== (solution[r][c]===1)){
        correct=false;
        cells[r][c].classList.add("diff");
      }
    }
  }

  if(correct){
    msg.innerText="🎉 がんばったね。ookuraさんならナイスゥですよね";
    msg.style.color="green";
  }else{
    msg.innerText="❌ まだ違うところあるよ（黄色がヒント）";
    msg.style.color="orange";
  }
}
</script>

</body>
</html>
